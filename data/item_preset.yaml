# SpeedFog item placement preset for Elden Ring Item Randomizer.
#
# Controls WHERE randomized items end up in the world.
#
# IMPORTANT: Only CoreMechanics allows customizing both items AND locations
# (EditItems=true, EditLocs=true). Other placement types have either fixed
# items or fixed locations enforced by the randomizer's PlacementMeta.
# Custom items listed under types with EditItems=false are silently replaced
# by defaults during Resolve(). See ItemPreset.cs:614-617.
#
# Placement priority:
#   1. Important mode (KeyItems, SacredFlaskUpgrades, ShadowRealmBlessings)
#      - first-pass placement, inherits LocationGroups for location tags
#   2. Custom mode (CoreMechanics) - placed after Important items
#   3. Anywhere mode (QuestItems, UpgradeBellBearings) - unrestricted
#
# Uses Item Randomizer's ItemPreset.ParsePreset().

NorandomItems:

- Name: Spectral Steed Whistle
  ID: goods:130
- Name: Flask of Wondrous Physick
  ID: goods:250
- Name: Crafting Kit
  ID: goods:8500
- Name: Spirit Calling Bell
  ID: goods:8158
- Name: Whetstone Knife
  ID: goods:8590
- Name: Lantern
