- Name: Gaol Upper Level Key
  ID: goods:2008005
- Name: O Mother
  ID: goods:2009004
- Name: Well Depths Key
  ID: goods:2008004

Placements:

# Key items at major boss/racemode locations.
# Items: fixed by randomizer (EditItems=false). Locations: editable.
# FixedLocs adds "boss" and "racemode" automatically.
- Type: KeyItems
  Mode: Important
  Items:
  - Group: keyitems
  Requires:
  - Tag: racemode
  - Tag: boss
  Excludes:
  - Tag: missable

# Quest items placed freely.
# Items: fixed by randomizer (EditItems=false). Locations: editable.
- Type: QuestItems
  Mode: Anywhere
  Items:
  - Group: questitems
  Excludes:
  - Tag: missable

# Weapons, talismans, crystal tears, and ashes of war at key locations.
# This is the ONLY placement type where both items and locations are customizable.
# Items that overflow tagged locations fall back to the general random pool.
