# Care Package Item Pool
#
# Curated lists of items for randomized starting builds.
# IDs are EquipParam row IDs (base, before upgrade encoding).
#
# Item types (maps to EMEDF ItemType for DirectlyGivePlayerItem):
#   Weapon (0):    weapons, shields, catalysts (EquipParamWeapon)
#   Protector (1): armor pieces (EquipParamProtector)
#   Accessory (2): talismans (EquipParamAccessory)
#   Goods (3):     sorceries, incantations, crystal tears (EquipParamGoods)
#
# Weapon upgrade encoding: base_id + upgrade_level
#   Standard: +0 to +25 (regular smithing stones)
#   Somber:   +0 to +10 (somber smithing stones)

