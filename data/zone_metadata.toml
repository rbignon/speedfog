[zones.outskirts_sidetomb_boss]
weight = 1

[zones.siofra_nokron_boss]
weight = 1.5

[zones.snowfield_hiddenpath_boss]
weight = 1

# Mini dungeons calibrated from race data
[zones.caelid_gaolcave]
