# Zone Metadata for SpeedFog Cluster Generation
#
# This file defines default weights per zone type and optional
# zone-specific overrides for cluster weight calculations.
#
# weight = relative traversal difficulty (data-driven for dungeons, phase-based for bosses)
#
# Multi-zone cluster weights use logarithmic aggregation by default:
#   cluster_weight = round(avg_zone_weight * (1 + 0.5 * ln(n_zones)))
# This reflects that players traverse a path through zones, not all of them.
# Override with [clusters.<id>] weight = X to use observed race data directly.

[defaults]
# Default weights by zone type
legacy_dungeon = 3
mini_dungeon = 1
major_boss = 1
boss_arena = 1
underground = 6
start = 1
final_boss = 2.5
other = 2

