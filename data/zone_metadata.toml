# Zone Metadata for SpeedFog Cluster Generation
#
# This file defines default weights per zone type and optional
# zone-specific overrides for cluster weight calculations.
#
# weight = relative traversal difficulty (data-driven for dungeons, phase-based for bosses)
#
# Multi-zone cluster weights use logarithmic aggregation:
#   cluster_weight = round(avg_zone_weight * (1 + 0.5 * ln(n_zones)))
# This reflects that players traverse a path through zones, not all of them.

[defaults]
# Default weights by zone type
legacy_dungeon = 3
mini_dungeon = 1
major_boss = 1
boss_arena = 1
underground = 6
start = 1
final_boss = 2.5
other = 2

# Zone-specific overrides
# Format: [zones.zone_name]
#         weight = X

# Base game legacy dungeons
[zones.stormveil]
weight = 8

[zones.stormveil_start]
weight = 4

[zones.academy]
weight = 6

[zones.academy_entrance]
weight = 3

[zones.academy_rooftops]
weight = 4

[zones.academy_courtyard]
weight = 3

[zones.leyndell]
weight = 10

[zones.volcano]
weight = 0.1

[zones.haligtree]
weight = 8

[zones.farumazula]
weight = 8

# Large catacombs
[zones.gelmir_hero_grave]
weight = 6

[zones.giant_conquering_hero_grave]
weight = 6

# Type overrides
[zones.volcano_abductors]
type = "boss_arena"

# Astel is a remembrance boss — override from boss_arena to major_boss
[zones.ainsel_boss]
type = "major_boss"

# Boss arenas: disable entry-as-exit (enter from front, exit from back)
[zones.ainsel_dragonkin]
allow_entry_as_exit = false

[zones.deeproot_boss]
allow_entry_as_exit = false

[zones.haligtree_malenia]
weight = 5
allow_entry_as_exit = true

# Mini dungeons calibrated from race data
[zones.caelid_gaolcave]
weight = 2

[zones.flamepeak_grave]
weight = 2.5

[zones.gelmir_grave]
weight = 2.5

[zones.limgrave_tunnels]
weight = 2

[zones.liurnia_tunnel]
weight = 2

[zones.outskirts_grave]
weight = 2

[zones.sewer]
weight = 6

[zones.sewer_catacombs]
weight = 2.5

# Base game type overrides: zones typed "other" but functionally dungeons
[zones.peninsula_morne]
weight = 3  # Castle Morne — detected as legacy_dungeon via fortressonly+legacy fog

[zones.mountaintops_start]
type = "mini_dungeon"  # Forbidden Lands, traversal zone comparable to mini dungeons
weight = 2

# Multi-phase major bosses (2+ phase transitions)
[zones.academy_library]
type = "major_boss"
weight = 2
allow_entry_as_exit = true

[zones.stormveil_godrick]
weight = 2
allow_entry_as_exit = true  # after exit pruning, only Godrick front remains (also the entry)

[zones.leyndell_sanctuary]
weight = 2

[zones.leyndell_throne]
weight = 2

[zones.flamepeak_firegiant]
weight = 2
allow_entry_as_exit = false

[zones.farumazula_maliketh]
weight = 2

# =============================================================================
# DLC - Shadow of the Erdtree
# =============================================================================

# DLC Final Boss
[zones.enirilim_radahn]
type = "final_boss"
weight = 5

# DLC Legacy Dungeons (type override: m20_ maps not in legacy_prefixes heuristic)
[zones.belurat]
type = "legacy_dungeon"
weight = 6

[zones.ensis]
type = "legacy_dungeon"

[zones.shadowkeep]
type = "legacy_dungeon"
weight = 6

[zones.shadowkeep_church]
type = "legacy_dungeon"

[zones.storehouse]
type = "legacy_dungeon"

[zones.midramanse]
type = "legacy_dungeon"

# DLC Mini Dungeons (calibrated from race data)
[zones.gravesite_catacombs]
weight = 3.5

[zones.gravesite_forge]
weight = 2.5

[zones.gravesite_gaol]
weight = 6

[zones.rauhbase_catacombs]
weight = 3.5

[zones.rauhbase_forge]
weight = 6

[zones.scadualtus_forge]
weight = 6

# DLC type overrides: zones not tagged as minidungeon in fog.txt (lead to new zones)
[zones.scadualtus_catacombs]
type = "mini_dungeon"
weight = 3

[zones.gravesite_dragonpit]
type = "mini_dungeon"

[zones.westrampart]
type = "mini_dungeon"  # Shadow Keep West Rampart, dungeon section
weight = 2

[zones.scadualtus_catacombs_boss]
type = "boss_arena"  # fog.txt Entrance has "major" tag, but Jori is a catacomb boss, not a remembrance boss

[zones.scadualtus_gaol]
weight = 3

# Major bosses: allow entry-as-exit so they can be pass-through nodes
[zones.altus_elemer]
type = "boss_arena"  # fog.txt Entrance has "major" tag, but Area has "minor" — Elemer is not a remembrance boss
allow_entry_as_exit = true

[zones.fissure_boss]
allow_entry_as_exit = true

[zones.jaggedpeak_bayle]
allow_entry_as_exit = true

[zones.midramanse_boss]
allow_entry_as_exit = true

[zones.peninsula_leonine]
allow_entry_as_exit = true

[zones.scadutree_base]
allow_entry_as_exit = true

[zones.sewer_mohg]
allow_entry_as_exit = true

[zones.storehouse_messmer]
weight = 2
allow_entry_as_exit = true

# Exclusions
[zones.leyndell2_erdtree]
exclude = true  # Ashen Erdtree entrance — no usable entry fogs in FogMod graph (AlternateOf + altlogic tags)

[zones.erdtree]
exclude = true  # Elden Beast arena — accessed via leyndell2_erdtree unique fog, not standalone

# DLC Exclusions (zones that don't work well as independent clusters)
[zones.rauhruins_postromina]
exclude = true

[zones.fissure_preboss]
exclude = true  # Funnels player into boss dropdown — fissure_boss has its own cluster (fissure_boss_674e)

[zones.graveyard_cave]
exclude = true

[zones.scadualtus_ymir]
exclude = true  # Cathedral of Manus Metyr interior — accessed via unique warp, not standalone

# Auriza Side Tomb: confusing trap-chest dungeon, monopolizes split(3/4) at mb=4
[zones.outskirts_sidetomb]
exclude = true

# =============================================================================
# Cluster-level traversal constraints
# =============================================================================
#
# exclude: remove this cluster entirely from the pool
# proximity_groups: fogs spatially close — entry and exit cannot share a group
# allowed_entries/allowed_exits: restrict eligible fogs
# Use "zone:fog_id" when the same fog_id appears in multiple zones

[clusters.volcano_ac44]
exclude = true  # Too small for legacy_dungeon (~30s to traverse)

[clusters.stormveil_db4a]
proximity_groups = [["AEG099_230_9001", "AEG099_002_9002"]]

[clusters.storehouse_cc6f]
proximity_groups = [["AEG099_230_9000", "AEG099_230_9500"]]

[clusters.altus_sagescave_1646]
proximity_groups = [["AEG099_001_9000", "AEG099_001_9002"]]

[clusters.academy_2a8a]
proximity_groups = [["1035452610", "1035462611"]]

[clusters.caelid_tower_109e]
proximity_groups = [["AEG099_230_9000", "AEG099_230_9001", "AEG099_230_9002"]]

[clusters.storehouse_6660]
proximity_groups = [["storehouse_back:AEG099_001_9000", "storehouse_back:AEG099_230_9000"]]

[clusters.midramanse_1ac8]
allowed_entries = ["AEG099_230_9500"]

[clusters.flamepeak_firegiant_07f0]
proximity_groups = [["m60_52_53_00-AEG099_002_9000", "m60_52_53_00-AEG099_003_9001"]]

[clusters.haligtree_elphael_700b]
allowed_entries = ["AEG099_230_9000"]
