# Phantom skins catalog. Each entry is baked into regulation.bin as one row
# in PhantomParam, SpEffectVfxParam, and SpEffectParam, all sharing the same
# id. Reserved id range: 1450700-1450799.
#
# Field reference (see docs/phantom-skins.md):
#   id           Reserved range 1450700-1450799, unique
#   name         Stable identifier consumed by speedfog-racing config
#   display_name Human-readable label
#   edge_color   RGB array, integers 0-255
#   edge_power   Outline thickness/intensity (float)
#   glow_scale   Bloom scale around outline (float, usually 0)
#   alpha        Overall opacity (float 0-1)

[[skins]]
id = 1450700
name = "gold-aura"
